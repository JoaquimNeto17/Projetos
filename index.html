<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Joaquim Neto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #16a34a;
            --secondary: #2563eb;
            --bg: #f0f4f8;
            --text: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== FUNDO COM PARTÍCULAS GEOMÉTRICAS ===== */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: linear-gradient(135deg, #e0f2fe 0%, #dcfce7 100%);
        }

        .cube {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 15px;
            opacity: 0.15;
            filter: blur(2px);
            animation: float-cube 15s infinite linear;
        }

        .cube:nth-child(1) { top: 10%; left: 10%; animation-duration: 18s; }
        .cube:nth-child(2) { top: 70%; left: 80%; width: 120px; height: 120px; animation-duration: 25s; }
        .cube:nth-child(3) { top: 40%; left: 40%; width: 50px; height: 50px; animation-duration: 12s; }
        .cube:nth-child(4) { top: 20%; left: 70%; animation-duration: 20s; }

        @keyframes float-cube {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 0.2; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.1; }
        }

        /* ===== CONTAINER ===== */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
        }

        .badge {
            background: var(--secondary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent; /* CORRIGIDO: Agora o texto aparece com o gradiente */
            display: block;
            width: 100%;
        }

        .subtitle {
            color: #64748b;
            font-weight: 500;
            margin-bottom: 40px;
        }

        /* ===== CARDS ===== */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.03) translateY(-5px);
            background: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .card-icon {
            font-size: 24px;
            margin-right: 20px;
            background: #f1f5f9;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .card-content { text-align: left; flex: 1; }
        .card-content h3 { color: var(--text); font-size: 1.1rem; }
        .card-content p { color: #94a3b8; font-size: 0.85rem; }

        .arrow { color: var(--secondary); opacity: 0.3; transition: 0.3s; }
        .card:hover .arrow { opacity: 1; transform: translateX(5px); }

    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
    </div>

    <div class="container">
        <div class="badge">SESI SENAI 2026</div>
        <h1>Joaquim Neto</h1>
        <p class="subtitle">Exercícios de Fixação • Front-End</p>

        <div class="card-list">
            <a href="Ex2/index.html" class="card">
                <div class="card-icon">📈</div>
                <div class="card-content">
                    <h3>Aumento de Salário</h3>
                    <p>Cálculo de reajuste automático</p>
                </div>
                <div class="arrow">➔</div>
            </a>

            <a href="Ex3/index.html" class="card">
                <div class="card-icon">🚌</div>
                <div class="card-content">
                    <h3>Transporte Fretado</h3>
                    <p>Controle de passageiros e lotação</p>
                </div>
                <div class="arrow">➔</div>
            </a>

            <a href="Ex1/index.html" class="card">
                <div class="card-icon">⏱️</div>
                <div class="card-content">
                    <h3>Horas Extras</h3>
                    <p>Cálculo de jornada e adicionais</p>
                </div>
                <div class="arrow">➔</div>
            </a>
        </div>
    </div>

</body>
</html>
