<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Horas Extras</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2316a34a'/%3E%3Cstop offset='100%25' stop-color='%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23grad)'/%3E%3Ctext x='50' y='72' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E⏱️%3C/text%3E%3C/svg%3E">

</head>
<body>
    <div class="app-wrapper">
        <div class="header-clock">
            <div class="clock-container">
                <span class="clock-icon">🇧🇷</span>
                <span id="dataHora">Carregando...</span>
            </div>
        </div>

        <div class="back-button-container">
            <a href="../index.html" class="back-button">
                <span class="back-icon">←</span>
                Voltar
            </a>
        </div>

        <div class="container">
            <div class="calculator-card">
                <div class="card-header">
                    <div class="icon-header">⏱️</div>
                    <h1>HORAS EXTRAS</h1>
                    <p>Calcule suas horas adicionais</p>
                </div>

                <form id="calcForm" onsubmit="processarCalculo(event)">
                    <div class="form-group">
                        <label>Salário mensal</label>
                        <div class="input-wrapper">
                            <span class="input-prefix">R$</span>
                            <input type="number" id="salario" step="0.01" placeholder="0,00" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Horas 50% (úteis)</label>
                            <input type="number" id="horaExtraDia" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Horas 100% (fim de sem.)</label>
                            <input type="number" id="horaExtraFimSemana" placeholder="0">
                        </div>
                    </div>

                    <button type="submit" id="btnCalcular">Calcular</button>
                </form>

                <div class="result-section">
                    <p class="result-label">TOTAL COM ADICIONAIS</p>
                    <div id="resultado">R$ 0,00</div>
                    <div id="resultDetail"></div>
                </div>
            </div>

            <div class="history-card">
                <div class="history-header">
                    <h2>Histórico</h2>
                    <button id="clearHistoryBtn" onclick="limparHistorico()">Limpar</button>
                </div>
                <div id="historyList">
                    <p class="empty-msg">Nenhum cálculo ainda</p>
                </div>
            </div>
        </div>
    </div>

    <script src="codigo.js"></script>
</body>
</html>
