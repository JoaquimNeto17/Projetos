<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Transporte Fretado</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <div class="header-clock">
            <div class="clock-container">
                <span class="clock-icon">🇧🇷</span>
                <span id="dataHora">Carregando...</span>
            </div>
        </div>

        <div class="back-button-container">
            <a href="../index.html" class="back-button">
                <span class="back-icon">←</span>
                Voltar
            </a>
        </div>

        <div class="container">
            <div class="calculator-card">
                <div class="card-header">
                    <div class="icon-header">🚌</div>
                    <h1>TRANSPORTE FRETADO</h1>
                    <p>Cálculo de fretamento</p>
                </div>

                <div class="form-group">
                    <label>Funcionários</label>
                    <input type="number" id="funcionarios" placeholder="Digite o número">
                </div>

                <button id="btnCalcular">Calcular</button>

                <div class="result-section">
                    <p class="result-label">TOTAL DO FRETAMENTO</p>
                    <div id="resultado">R$ 0,00</div>
                    <div id="resultDetail"></div>
                </div>
            </div>

            <div class="history-card">
                <div class="history-header">
                    <h2>Histórico</h2>
                    <button id="clearHistoryBtn">Limpar</button>
                </div>
                <div id="historyList">
                    <p class="empty-msg">Nenhum cálculo ainda</p>
                </div>
            </div>
        </div>
    </div>

    <script src="codigo.js"></script>
</body>
</html>
