<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Transporte Fretado</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2316a34a'/%3E%3Cstop offset='100%25' stop-color='%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23grad)'/%3E%3Ctext x='50' y='72' font-size='52' text-anchor='middle' fill='white' font-family='Arial'%3E🚌%3C/text%3E%3C/svg%3E">

</head>
<body>
    <div class="app-wrapper">
        <div class="header-clock">
            <div class="clock-container">
                <span class="clock-icon">🇧🇷</span>
                <span id="dataHora">Carregando...</span>
            </div>
        </div>

        <div class="back-button-container">
            <a href="../index.html" class="back-button">
                <span class="back-icon">←</span>
                Voltar
            </a>
        </div>

        <div class="container">
            <div class="calculator-card">
                <div class="card-header">
                    <div class="icon-header">🚌</div>
                    <h1>TRANSPORTE FRETADO</h1>
                    <p>Cálculo de fretamento</p>
                </div>

                <div class="form-group">
                    <label>Funcionários</label>
                    <input type="number" id="funcionarios" placeholder="Digite o número">
                </div>

                <button id="btnCalcular">Calcular</button>

                <div class="result-section">
                    <p class="result-label">TOTAL DO FRETAMENTO</p>
                    <div id="resultado">R$ 0,00</div>
                    <div id="resultDetail"></div>
                </div>
            </div>

            <div class="history-card">
                <div class="history-header">
                    <h2>Histórico</h2>
                    <button id="clearHistoryBtn">Limpar</button>
                </div>
                <div id="historyList">
                    <p class="empty-msg">Nenhum cálculo ainda</p>
                </div>
            </div>
        </div>
    </div>

    <script src="codigo.js"></script>
</body>
</html>
